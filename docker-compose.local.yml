# Connect Real Peers to Your Live Genesis Bootstrap
# 
# Your genesis bootstrap: http://102.90.98.234:3001
# 
# Run: docker-compose -f docker-compose.local.yml up
# 
# Creates 5 REAL nodes that connect to YOUR live network:
# - 2 additional bootstraps (ports 3002, 3003) - will replicate with your genesis
# - 3 peers (ports 3004, 3005, 3006) - will sync via VNS discovery

version: '3.8'

services:
  # Bootstrap 2 - Joins your live network, replicates data
  bootstrap-2:
    build: .
    container_name: verimutfs-bs2
    ports:
      - "3002:3001"
    environment:
      - ENABLE_VNS=true
      - HTTP_BOOTSTRAP_PEERS=bootstrap-node
      - BOOTSTRAP_PUBLIC_URL=http://host.docker.internal:3002
      - VERBOSE=true
    volumes:
      - bs2-data:/data
    networks:
      - verimutfs

  # Bootstrap 3 - Another real bootstrap joining your network
  bootstrap-3:
    build: .
    container_name: verimutfs-bs3
    ports:
      - "3003:3001"
    environment:
      - ENABLE_VNS=true
      - HTTP_BOOTSTRAP_PEERS=bootstrap-node
      - BOOTSTRAP_PUBLIC_URL=http://host.docker.internal:3003
      - VERBOSE=true
    volumes:
      - bs3-data:/data
    networks:
      - verimutfs

  # Peer 1 - Real peer with promotion capability
  peer-1:
    build: .
    container_name: verimutfs-peer1
    ports:
      - "3004:3001"
    environment:
      - ENABLE_VNS=true
      - HTTP_BOOTSTRAP_PEERS=bootstrap-node
      - BOOTSTRAP_PUBLIC_URL=http://host.docker.internal:3004
      - ENABLE_PEER_PROMOTION=true
    volumes:
      - peer1-data:/data
    networks:
      - verimutfs

  # Peer 2 - Real peer with promotion capability
  peer-2:
    build: .
    container_name: verimutfs-peer2
    ports:
      - "3005:3001"
    environment:
      - ENABLE_VNS=true
      - HTTP_BOOTSTRAP_PEERS=bootstrap-node
      - BOOTSTRAP_PUBLIC_URL=http://host.docker.internal:3005
      - ENABLE_PEER_PROMOTION=true
    volumes:
      - peer2-data:/data
    networks:
      - verimutfs

  # Peer 3 - Basic peer (no promotion)
  peer-3:
    build: .
    container_name: verimutfs-peer3
    ports:
      - "3006:3001"
    environment:
      - ENABLE_VNS=true
      - HTTP_BOOTSTRAP_PEERS=bootstrap-node
    volumes:
      - peer3-data:/data
    networks:
      - verimutfs

volumes:
  genesis-data:
  bs2-data:
  bs3-data:
  peer1-data:
  peer2-data:

networks:
  verimutfs:
    driver: bridge
